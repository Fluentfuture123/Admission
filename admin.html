<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fluent Future Admin Panel</title>

  <!-- Image export library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Fluent Future Admin Panel</h1>
      <p>View and manage student submissions</p>
    </header>

    <div class="submissions-container">
      <div class="controls">
        <div class="left-controls">
          <button class="btn-refresh" id="btnRefresh">🔄 Refresh</button>
          <button class="btn-export" id="btnExportCSV">📥 Export CSV</button>
        </div>
        <div class="right-controls">
          <button class="btn-delete" id="btnClearAll">🗑️ Clear All</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total Submissions</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="lastId">-</div>
          <div class="stat-label">Last Admission ID</div>
        </div>
      </div>

      <div id="submissionsList"></div>

      <div class="footer">
        <p>💾 Data is stored locally in your browser.</p>
        <p>🔒 Keep this page private.</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Submission Details</h2>
        <button class="close-modal" id="closeModalBtn" aria-label="Close">&times;</button>
      </div>

      <div id="detailsContent" class="modal-body"></div>

      <div class="modal-footer">
        <button class="btn-modal btn-image" id="btnDownloadImage">🖼️ Download Image (A4)</button>
        <button class="btn-modal btn-close" id="btnClose">Close</button>
      </div>
    </div>

    <!-- Hidden print area used for Image generation -->
    <div id="printArea" class="print-area" aria-hidden="true" style="display:none;"></div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
