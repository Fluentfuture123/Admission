<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Welcome — Fluent Future Academy</title>
  <link rel="stylesheet" href="index.css">
  <link rel="icon" type="image/png" href="IMG/logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<base target="_blank">
</head>
<body>

  <!-- Animated Background Particles -->
  <div class="particles-container" id="particles"></div>

  <!-- Floating Decorations -->
  <img src="IMG/pencil-clipart-7.png" class="float-decor float-pencil" alt="">
  <img src="IMG/Ruler1.png" class="float-decor float-ruler" alt="">

  <!-- Main Content -->
  <div class="main-wrapper">

    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-glow"></div>
      <div class="logo-ring logo-ring-1"></div>
      <div class="logo-ring logo-ring-2"></div>
      <div class="logo-img-wrapper">
        <img src="IMG/logo.jpeg" alt="Fluent Future Logo" class="logo-img">
      </div>
    </div>

    <!-- Text Content -->
    <div class="text-content">
      <div class="welcome-badge">
        <span class="badge-dot"></span>
        Welcome to
      </div>
      <h1 class="main-heading">
        <span class="line-1">Fluent Future</span>
        <span class="line-2">Academy</span>
      </h1>
      <p class="tagline">
        Shaping Minds, Building Futures.<br>
        <em>Start your journey with us today.</em>
      </p>
    </div>

    <!-- Admission Arrow -->
    <div class="admission-section">
      <div class="arrow-label">Get Started</div>
      <div class="arrow-container" onclick="goToAdmission()" role="button" tabindex="0" aria-label="Go to admission form">
        <div class="arrow-btn">
          <span class="arrow-icon">➜</span>
        </div>
        <div class="arrow-pulse"></div>
      </div>
      <div class="arrow-text">Admission Form</div>
    </div>

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
      <a href="about.html" class="nav-btn nav-btn-secondary">
        <span class="btn-icon">ℹ️</span>
        About Us
      </a>
      <a href="contact.html" class="nav-btn nav-btn-secondary">
        <span class="btn-icon">📞</span>
        Contact
      </a>
    </div>

  </div>

  <!-- Footer -->
  <div class="home-footer">
    <span>Fluent Future Academy</span> &copy; 2026 — All rights reserved
  </div>

  <script src="index.js"></script>

</body>
</html>
